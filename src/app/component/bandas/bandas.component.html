<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">


  <title>Paouvir</title>

  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&display=swap" rel="stylesheet">

</head>
<body>
  <aside>
    <app-sidenav></app-sidenav>
  </aside>
  <main>

    <section>

      <div class="titulo">
        <h2>Bandas</h2>
      </div>

      <div class ="input-botoes">
        <app-input></app-input>

        <app-botao tipo="criar" (click)="abrirModalBanda()">
         <i class="bi bi-plus-circle"></i>
          Criar Banda
       </app-botao>

      </div>

      <div class="containerBandas">
        <app-card [tipo]="'content'" routerLink="/bandatal" link="/bandatal">
          Banda 1
        </app-card>

        <app-card [tipo]="'content'">
          Banda 2
        </app-card>

        <app-card [tipo]="'content'">
          Banda 3
        </app-card>

        <app-card [tipo]="'content'">
          Banda 4
        </app-card>

        <app-card [tipo]="'content'">
          Banda 5
        </app-card>
      </div>

    </section>

  </main>

  <app-modal-criar-banda
    *ngIf="modalBandaAberto"
    (fechar)="fecharModalBanda()">
  </app-modal-criar-banda>

</body>
</html>
