<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Cadastro</title>

  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&display=swap" rel="stylesheet">

</head>
<body>
<h1>PAOUVIR</h1>
<p>Preencha os Campos para realizar seu cadastro</p>

<div>
  <form action="#" method="post">

    <app-input
      class = input-pacote
      label="Nome Completo"
      tipo="text"
      placeholder="Digite seu nome completo">
    </app-input>

      <app-input
        class = input-pacote
        label="Usuário"
        tipo="username"
        placeholder="Digite seu nome de usuário">
      </app-input>

      <app-input
        class = input-pacote
        label="Email"
        tipo="email"
        placeholder="Digite seu email">
      </app-input>

      <app-input
        class = input-pacote
        label="Senha"
        tipo="password"
        placeholder="Digite sua senha">
      </app-input>

      <app-input
        class = input-pacote
        label="Perfil"
        tipo="select"
        [opcoes]="perfil"
        placeholder="Selecione seu perfil">
      </app-input>

      <app-botao [tipo]="'cadastro'">
        Cadastrar
      </app-botao>
      <app-botao [tipo] = "'menu'">
        Já tenho cadastro
      </app-botao>

  </form>
  </div>

</body>
</html>
