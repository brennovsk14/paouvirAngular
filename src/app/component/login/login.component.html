<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300..700&display=swap" rel="stylesheet">

  <title>Login</title>
</head>
<body>
<main>
  <div id="container">
    <img src="../../../assets/imagens/logoSolo.png" alt="Logo Paouvir Branco">
    <div id="box-login">
      <h2>Login</h2>
      <form action="#" method="post">

        <app-input
          class = input-pacote
          tipo = "username"
          label = "Usuário"
          placeholder ="Digite seu nome de usuário">
        </app-input>

        <app-input
          class = input-pacote
          tipo = "password"
          label = "Senha"
          placeholder ="Digite sua senha">
        </app-input>

        </form>

        <div class="containerBotoes">
          <app-botao [tipo]="'login'" (click)="acessarPaouvir()">
            Entrar
          </app-botao>

          <app-botao [tipo]="'cadastro'" (click)="cadastrarPaouvir()">
            Cadastre-se
          </app-botao>
        </div>

    </div>
  </div>

</main>

</body>
</html>
